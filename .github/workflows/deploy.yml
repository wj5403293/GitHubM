# GitHub Pages 自动部署 + Android APK 构建工作流
# 推送到 main 分支时：
#   1. 构建 Web 应用（dist/）
#   2. 部署到 GitHub Pages
#   3. 打包 Android APK（WebView 壳 + dist/ 资源）
name: Deploy & Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: # 支持手动触发

# GITHUB_TOKEN 权限：Pages 部署需要 pages + id-token
permissions:
  contents: read
  pages: write
  id-token: write

# 同组并发：新部署取消旧部署（仅影响 Pages，APK 构建不受影响）
concurrency:
  group: pages
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1：构建 Web 应用 ───────────────────────────────────────
  build-web:
    name: 构建 Web 应用
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          # pnpm/action-setup 自身处理 store 缓存；
          # 不在 setup-node 中配 cache: pnpm，
          # 避免首次提交时 lockfile 不存在导致步骤失败

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Web 应用
        run: pnpm exec vite build

      - name: 上传 Web 构建产物（供后续 Job 使用）
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 1   # 仅在本次 workflow 期间保留

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 2：部署到 GitHub Pages ─────────────────────────────────
  deploy-pages:
    name: 部署到 GitHub Pages
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Job 3：构建 Android APK ────────────────────────────────────
  build-apk:
    name: 构建 Android APK
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码（含 android/ 项目源码）
        uses: actions/checkout@v4

      - name: 下载 Web 构建产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: 将 Web 资源复制到 Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp -r dist/. android/app/src/main/assets/

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 设置 Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          # 缓存 Gradle 依赖，加快后续构建
          cache-read-only: false

      - name: 生成 local.properties（指向预装 Android SDK）
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: 接受 Android SDK 许可证
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: 构建 Debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: github-manager-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

